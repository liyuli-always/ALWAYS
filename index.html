<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chat Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Sans+JP:wght@100;200;300;400&display=swap" rel="stylesheet">
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --deep-navy: #0a1128;
      --navy-mid: #0f1b3d;
      --navy-light: #162044;
      --accent-blue: #1c3a6e;
      --glow-cyan: #2d5fa0;
      --text-primary: rgba(210, 220, 240, 0.92);
      --text-secondary: rgba(170, 185, 215, 0.7);
      --text-dim: rgba(140, 160, 195, 0.45);
      --sender-bg: rgba(28, 58, 110, 0.35);
      --receiver-bg: rgba(15, 27, 61, 0.55);
      --border-subtle: rgba(45, 95, 160, 0.15);
      --input-bg: rgba(10, 17, 40, 0.85);
      --font-serif: 'Cormorant Garamond', serif;
      --font-sans: 'Noto Sans JP', sans-serif;
      --success-green: rgba(78, 205, 196, 0.8);
      --error-red: rgba(220, 100, 100, 0.8);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--deep-navy);
      font-family: var(--font-sans);
      font-weight: 200;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ===== Breathing Background ===== */
    .breathing-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      /* Base: Pitch Black */
      background: #000000;
    }

    .breathing-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      /* Overlay: Deep Navy Radial Gradient */
      background: radial-gradient(
        ellipse 120% 100% at 50% 60%,
        var(--navy-mid) 0%,
        var(--deep-navy) 60%,
        #000000 100%
      );
      /* Slow breathing animation over 12 seconds */
      animation: breathe-dark 12s ease-in-out infinite;
    }

    @keyframes breathe-dark {
      0%, 100% {
        opacity: 0.9;
        transform: scale(1);
      }
      50% {
        opacity: 0.15;
        transform: scale(1.02); /* Slight expansion for breathing feel */
      }
    }

    /* Subtle floating particles */
    .particle-layer {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(45, 95, 160, 0.25), transparent 70%);
      animation: float linear infinite;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) scale(0.5);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh) scale(1.2);
        opacity: 0;
      }
    }

    /* ===== App Container ===== */
    .app {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 430px;
      margin: 0 auto;
    }

    /* ===== Header ===== */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: rgba(10, 17, 40, 0.6);
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .back-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
      transition: color 0.3s ease;
    }

    .back-btn:hover {
      color: var(--text-primary);
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-blue), var(--glow-cyan));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-serif);
      font-size: 16px;
      font-weight: 300;
      color: var(--text-primary);
      position: relative;
    }

    .avatar::after {
      content: '';
      position: absolute;
      bottom: 1px;
      right: 1px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ecdc4;
      border: 2px solid var(--deep-navy);
      animation: pulse-dot 3s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.85); }
    }

    .header-info h1 {
      font-family: var(--font-serif);
      font-size: 16px;
      font-weight: 300;
      letter-spacing: 0.05em;
      color: var(--text-primary);
    }

    .header-info .status {
      font-size: 11px;
      font-weight: 200;
      color: var(--text-dim);
      letter-spacing: 0.08em;
    }

    .header-right {
      display: flex;
      gap: 16px;
    }

    .header-icon {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 16px;
      cursor: pointer;
      transition: color 0.3s ease;
      padding: 4px;
    }

    .header-icon:hover {
      color: var(--text-primary);
    }

    /* ===== Messages Area ===== */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scroll-behavior: smooth;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .messages::-webkit-scrollbar {
      display: none;
    }

    .date-divider {
      text-align: center;
      padding: 16px 0 12px;
    }

    .date-divider span {
      font-family: var(--font-serif);
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      background: rgba(10, 17, 40, 0.5);
      padding: 4px 16px;
      border-radius: 12px;
      border: 1px solid var(--border-subtle);
    }

    .message {
      max-width: 78%;
      padding: 12px 16px;
      border-radius: 18px;
      position: relative;
      animation: msg-appear 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(12px);
    }

    @keyframes msg-appear {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.sent {
      align-self: flex-end;
      background: var(--sender-bg);
      border: 1px solid rgba(45, 95, 160, 0.2);
      border-bottom-right-radius: 4px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .message.received {
      align-self: flex-start;
      background: var(--receiver-bg);
      border: 1px solid rgba(22, 32, 68, 0.4);
      border-bottom-left-radius: 4px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .message.error {
      border-color: rgba(220, 100, 100, 0.3);
    }

    .message p {
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 200;
      line-height: 2.0;
      letter-spacing: 0.03em;
      color: var(--text-primary);
    }

    .message.error p {
      color: var(--error-red);
      font-size: 12px;
    }

    .message .time {
      display: block;
      text-align: right;
      font-family: var(--font-serif);
      font-size: 10px;
      font-weight: 300;
      color: var(--text-dim);
      margin-top: 6px;
      letter-spacing: 0.1em;
    }

    .message.sent .time {
      color: rgba(170, 195, 230, 0.4);
    }

    .message.sent:hover .msg-edit-btn {
      opacity: 1;
    }

    .msg-edit-btn {
      position: absolute;
      top: -10px;
      right: -10px;
      background: var(--receiver-bg);
      border: 1px solid var(--border-subtle);
      border-radius: 50%;
      width: 26px;
      height: 26px;
      color: var(--text-dim);
      font-size: 13px;
      cursor: pointer;
      opacity: 0;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      backdrop-filter: blur(10px);
    }

    .msg-edit-btn:hover {
      color: var(--glow-cyan);
      border-color: var(--glow-cyan);
    }

    .msg-edit-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg-edit-textarea {
      width: 100%;
      background: rgba(10, 17, 40, 0.6);
      border: 1px solid rgba(45, 95, 160, 0.4);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 14px;
      resize: vertical;
      min-height: 80px;
      outline: none;
      line-height: 1.5;
    }

    .msg-edit-textarea:focus {
      border-color: var(--glow-cyan);
    }

    .msg-edit-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .msg-edit-action-btn {
      padding: 6px 14px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 300;
      cursor: pointer;
      border: 1px solid var(--border-subtle);
      background: transparent;
      color: var(--text-secondary);
      transition: all 0.2s ease;
      letter-spacing: 0.05em;
    }

    .msg-edit-action-btn:hover {
      background: rgba(45, 95, 160, 0.15);
      color: var(--text-primary);
    }

    .msg-edit-action-btn.save {
      background: linear-gradient(135deg, var(--accent-blue), var(--glow-cyan));
      color: var(--text-primary);
      border: none;
    }

    .msg-edit-action-btn.save:hover {
      box-shadow: 0 4px 12px rgba(45, 95, 160, 0.4);
    }

    /* Read receipt */
    .message.sent .read-receipt {
      font-size: 9px;
      color: rgba(78, 205, 196, 0.5);
      margin-right: 4px;
    }

    /* ===== Typing Indicator ===== */
    .typing-indicator {
      align-self: flex-start;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 18px;
      background: var(--receiver-bg);
      border: 1px solid rgba(22, 32, 68, 0.4);
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      backdrop-filter: blur(10px);
      opacity: 0;
      animation: msg-appear 0.4s ease forwards;
    }

    .typing-indicator .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--text-dim);
      animation: typing-bounce 1.4s ease-in-out infinite;
    }

    .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing-bounce {
      0%, 60%, 100% {
        transform: translateY(0);
        opacity: 0.4;
      }
      30% {
        transform: translateY(-6px);
        opacity: 1;
      }
    }

    /* ===== Input Area ===== */
    .input-area {
      padding: 12px 16px 28px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: rgba(10, 17, 40, 0.7);
      border-top: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }

    .input-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }

    .input-actions {
      display: flex;
      gap: 8px;
      padding-bottom: 8px;
    }

    .action-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 18px;
      cursor: pointer;
      transition: all 0.3s ease;
      padding: 4px;
    }

    .action-btn:hover {
      color: var(--glow-cyan);
      transform: scale(1.1);
    }

    .input-field {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--border-subtle);
      border-radius: 22px;
      padding: 10px 18px;
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 200;
      letter-spacing: 0.03em;
      outline: none;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .input-field::placeholder {
      color: var(--text-dim);
      font-weight: 200;
    }

    .input-field:focus {
      border-color: rgba(45, 95, 160, 0.4);
      box-shadow: 0 0 20px rgba(45, 95, 160, 0.08);
    }

    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, var(--accent-blue), var(--glow-cyan));
      color: var(--text-primary);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      flex-shrink: 0;
      opacity: 0.6;
    }

    .send-btn.active {
      opacity: 1;
      box-shadow: 0 4px 20px rgba(45, 95, 160, 0.3);
    }

    .send-btn:hover {
      transform: scale(1.05);
    }

    .send-btn:active {
      transform: scale(0.95);
    }

    /* ===== Ambient Glow Effects ===== */
    .ambient-glow {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(80px);
    }

    .glow-1 {
      width: 300px;
      height: 300px;
      background: rgba(28, 58, 110, 0.12);
      top: -50px;
      right: -80px;
      animation: glow-drift-1 12s ease-in-out infinite;
    }

    .glow-2 {
      width: 250px;
      height: 250px;
      background: rgba(45, 95, 160, 0.08);
      bottom: 100px;
      left: -60px;
      animation: glow-drift-2 15s ease-in-out infinite;
    }

    .glow-3 {
      width: 200px;
      height: 200px;
      background: rgba(78, 205, 196, 0.04);
      top: 40%;
      right: -40px;
      animation: glow-drift-3 10s ease-in-out infinite;
    }

    @keyframes glow-drift-1 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-30px, 40px); }
    }

    @keyframes glow-drift-2 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(40px, -30px); }
    }

    @keyframes glow-drift-3 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-20px, 20px) scale(1.1); }
    }

    /* ===== Settings Panel (Slide-over) ===== */
    .settings-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(5, 8, 18, 0.6);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    .settings-overlay.open {
      opacity: 1;
      visibility: visible;
    }

    .settings-panel {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      max-width: 430px;
      z-index: 101;
      background: var(--deep-navy);
      transform: translateX(100%);
      transition: transform 0.45s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .settings-panel.open {
      transform: translateX(0);
    }

    .settings-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: rgba(10, 17, 40, 0.6);
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }

    .settings-header h2 {
      font-family: var(--font-serif);
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: var(--text-primary);
    }

    .settings-close {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 22px;
      cursor: pointer;
      padding: 4px 8px;
      transition: color 0.3s ease;
    }

    .settings-close:hover {
      color: var(--text-primary);
    }

    .settings-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px 40px;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .settings-body::-webkit-scrollbar {
      display: none;
    }

    .settings-section {
      margin-bottom: 32px;
    }

    .settings-section-title {
      font-family: var(--font-serif);
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .settings-label {
      display: block;
      font-size: 13px;
      font-weight: 300;
      color: var(--text-secondary);
      margin-bottom: 8px;
      letter-spacing: 0.04em;
    }

    .settings-hint {
      font-size: 11px;
      font-weight: 200;
      color: var(--text-dim);
      margin-top: 6px;
      line-height: 1.6;
    }

    .settings-input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 200;
      letter-spacing: 0.03em;
      outline: none;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .settings-input:focus {
      border-color: rgba(45, 95, 160, 0.4);
      box-shadow: 0 0 20px rgba(45, 95, 160, 0.08);
    }

    .settings-input::placeholder {
      color: var(--text-dim);
    }

    .settings-textarea {
      width: 100%;
      min-height: 180px;
      background: var(--input-bg);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 200;
      letter-spacing: 0.03em;
      line-height: 1.7;
      outline: none;
      resize: vertical;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .settings-textarea:focus {
      border-color: rgba(45, 95, 160, 0.4);
      box-shadow: 0 0 20px rgba(45, 95, 160, 0.08);
    }

    .settings-textarea::placeholder {
      color: var(--text-dim);
    }

    .settings-btn-row {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .settings-btn {
      flex: 1;
      padding: 12px 20px;
      border-radius: 12px;
      border: 1px solid var(--border-subtle);
      background: var(--input-bg);
      color: var(--text-secondary);
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 300;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.04em;
    }

    .settings-btn:hover {
      border-color: rgba(45, 95, 160, 0.35);
      color: var(--text-primary);
    }

    .settings-btn.primary {
      background: linear-gradient(135deg, var(--accent-blue), var(--glow-cyan));
      border: none;
      color: var(--text-primary);
    }

    .settings-btn.primary:hover {
      box-shadow: 0 4px 20px rgba(45, 95, 160, 0.3);
    }

    .settings-btn.danger {
      border-color: rgba(220, 100, 100, 0.25);
      color: rgba(220, 100, 100, 0.7);
    }

    .settings-btn.danger:hover {
      border-color: rgba(220, 100, 100, 0.5);
      color: rgba(220, 100, 100, 0.9);
      background: rgba(220, 100, 100, 0.08);
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(10, 17, 40, 0.95);
      border: 1px solid var(--border-subtle);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 10px 24px;
      border-radius: 20px;
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 300;
      color: var(--text-primary);
      letter-spacing: 0.05em;
      z-index: 200;
      opacity: 0;
      transition: opacity 0.4s ease, transform 0.4s ease;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.success {
      border-color: rgba(78, 205, 196, 0.3);
    }

    .toast.error {
      border-color: rgba(220, 100, 100, 0.3);
    }

    /* API key visibility toggle */
    .api-key-wrapper {
      position: relative;
    }

    .api-key-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 14px;
      cursor: pointer;
      padding: 4px;
      transition: color 0.3s ease;
    }

    .api-key-toggle:hover {
      color: var(--text-secondary);
    }

    .api-key-wrapper .settings-input {
      padding-right: 40px;
    }

    /* Model selector */
    .settings-select {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 200;
      letter-spacing: 0.03em;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='rgba(140,160,195,0.45)' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 14px center;
      cursor: pointer;
      transition: border-color 0.3s ease;
    }

    .settings-select:focus {
      border-color: rgba(45, 95, 160, 0.4);
    }

    .settings-select option {
      background: var(--deep-navy);
      color: var(--text-primary);
    }

    /* Status indicator in header */
    .connection-status {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    .connection-status.connected {
      background: var(--success-green);
      box-shadow: 0 0 6px rgba(78, 205, 196, 0.4);
    }

    .connection-status.disconnected {
      background: var(--text-dim);
    }

    /* ===== Sidebar Panel (Slide-over from left) ===== */
    .sidebar-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(5, 8, 18, 0.6);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    .sidebar-overlay.open {
      opacity: 1;
      visibility: visible;
    }

    .sidebar-panel {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 85%;
      max-width: 320px;
      z-index: 101;
      background: var(--deep-navy);
      transform: translateX(-100%);
      transition: transform 0.45s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid var(--border-subtle);
    }

    .sidebar-panel.open {
      transform: translateX(0);
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: rgba(10, 17, 40, 0.6);
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }

    .sidebar-header h2 {
      font-family: var(--font-serif);
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: var(--text-primary);
    }

    .sidebar-close {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 22px;
      cursor: pointer;
      padding: 4px 8px;
      transition: color 0.3s ease;
    }

    .sidebar-close:hover {
      color: var(--text-primary);
    }

    .sidebar-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px 40px;
      -ms-overflow-style: none;
      scrollbar-width: none;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .sidebar-body::-webkit-scrollbar {
      display: none;
    }

    .sidebar-actions {
      display: flex;
    }

    .sidebar-btn {
      width: 100%;
      padding: 12px 20px;
      border-radius: 12px;
      border: 1px solid var(--border-subtle);
      background: var(--input-bg);
      color: var(--text-secondary);
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 300;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.04em;
    }

    .sidebar-btn.primary {
      background: linear-gradient(135deg, var(--accent-blue), var(--glow-cyan));
      border: none;
      color: var(--text-primary);
    }

    .sidebar-btn.primary:hover {
      box-shadow: 0 4px 20px rgba(45, 95, 160, 0.3);
    }

    .session-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .session-item {
      display: flex;
      flex-direction: column;
      padding: 14px 16px;
      background: rgba(15, 27, 61, 0.4);
      border: 1px solid rgba(45, 95, 160, 0.1);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
    }

    .session-item:hover {
      background: rgba(28, 58, 110, 0.3);
      border-color: rgba(45, 95, 160, 0.3);
    }

    .session-item.active {
      background: rgba(45, 95, 160, 0.2);
      border-color: var(--glow-cyan);
    }

    .session-title {
      font-size: 13px;
      font-weight: 300;
      color: var(--text-primary);
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 24px;
    }

    .session-title-edit {
      width: calc(100% - 40px);
      background: rgba(10, 17, 40, 0.9);
      border: 1px solid rgba(45, 95, 160, 0.6);
      border-radius: 4px;
      padding: 4px 8px;
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 300;
      outline: none;
      margin-bottom: 6px;
      box-shadow: 0 0 10px rgba(45, 95, 160, 0.2);
    }
    .session-title-edit:focus {
      border-color: var(--glow-cyan);
    }

    .session-date {
      font-family: var(--font-serif);
      font-size: 10px;
      font-weight: 300;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }

    .session-edit {
      position: absolute;
      top: 14px;
      right: 36px;
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 14px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s ease, color 0.2s ease;
    }

    .session-item:hover .session-edit {
      opacity: 1;
    }

    .session-edit:hover {
      color: var(--glow-cyan);
    }

    .session-delete {
      position: absolute;
      top: 12px;
      right: 12px;
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 16px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s ease, color 0.2s ease;
    }

    .session-item:hover .session-delete {
      opacity: 1;
    }

    .session-delete:hover {
      color: var(--error-red);
    }

    /* ===== Scrollbar for desktop preview ===== */
    @media (min-width: 431px) {
      .app {
        border-left: 1px solid var(--border-subtle);
        border-right: 1px solid var(--border-subtle);
      }
      .settings-panel {
        right: 50%;
        transform: translateX(50%) translateX(50%);
        opacity: 0;
        visibility: hidden;
      }
      .settings-panel.open {
        transform: translateX(50%) translateX(0);
        opacity: 1;
        visibility: visible;
      }
      .sidebar-panel {
        left: 50%;
        transform: translateX(-50%) translateX(-50%);
        opacity: 0;
        visibility: hidden;
      }
      .sidebar-panel.open {
        transform: translateX(-50%) translateX(0);
        opacity: 1;
        visibility: visible;
      }
    }
  </style>
</head>
<body>
  <!-- Breathing Background -->
  <div class="breathing-bg"></div>

  <!-- Ambient Glow Orbs -->
  <div class="ambient-glow glow-1"></div>
  <div class="ambient-glow glow-2"></div>
  <div class="ambient-glow glow-3"></div>

  <!-- Floating Particles -->
  <div class="particle-layer" id="particleLayer"></div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- App -->
  <div class="app">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <button class="back-btn" id="sidebarBtn" aria-label="Menu" title="履歴">≡</button>
        <div class="avatar">A</div>
        <div class="header-info">
          <h1>Chat Room</h1>
          <div class="status" id="headerStatus">
            <span class="connection-status disconnected" id="connectionDot"></span>
            <span id="statusText">API未接続</span>
          </div>
        </div>
      </div>
      <div class="header-right">
        <button class="header-icon" id="clearChatBtn" aria-label="Clear chat" title="チャットをクリア">✧</button>
        <button class="header-icon" id="settingsBtn" aria-label="Settings" title="設定">⚙</button>
      </div>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages">
      <div class="date-divider">
        <span id="dateDivider"></span>
      </div>

      <!-- Welcome message -->
      <div class="message received" style="animation-delay: 0.1s">
        <p>設定画面からAPIキーを入力すると、AIとの会話を始められます。<br>右上の ⚙ ボタンをタップしてください。</p>
        <span class="time" id="welcomeTime"></span>
      </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
      <div class="input-wrapper">
        <div class="input-actions">
          <button class="action-btn" aria-label="Attach">＋</button>
        </div>
        <textarea
          class="input-field"
          id="inputField"
          placeholder="メッセージを入力..."
          rows="1"
        ></textarea>
        <button class="send-btn" id="sendBtn" aria-label="Send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Settings Overlay -->
  <div class="settings-overlay" id="settingsOverlay"></div>

  <!-- Settings Panel -->
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
      <h2>Settings</h2>
      <button class="settings-close" id="settingsClose">×</button>
    </div>
    <div class="settings-body">
      <!-- Provider -->
      <div class="settings-section">
        <div class="settings-section-title">API Configuration</div>
        <label class="settings-label" for="providerSelect">Provider</label>
        <select class="settings-select" id="providerSelect">
          <option value="gemini">Google Gemini</option>
          <option value="openai">OpenAI (GPT)</option>
          <option value="xai">xAI (Grok)</option>
        </select>
      </div>

      <!-- API Key -->
      <div class="settings-section">
        <label class="settings-label" id="apiKeyLabel" for="apiKeyInput">API Key</label>
        <div class="api-key-wrapper">
          <input
            type="password"
            class="settings-input"
            id="apiKeyInput"
            placeholder=""
            autocomplete="off"
            spellcheck="false"
          >
          <button class="api-key-toggle" id="apiKeyToggle" aria-label="Toggle visibility">👁</button>
        </div>
        <div class="settings-hint" id="apiKeyHint">
          キーはこのブラウザのlocalStorageに保存されます。
        </div>
      </div>

      <!-- Model -->
      <div class="settings-section">
        <label class="settings-label" for="modelSelect">Model</label>
        <select class="settings-select" id="modelSelect"></select>
      </div>

      <!-- System Prompt -->
      <div class="settings-section">
        <div class="settings-section-title">Character</div>
        <label class="settings-label" for="systemPromptInput">System Prompt</label>
        <textarea
          class="settings-textarea"
          id="systemPromptInput"
          placeholder="AIのキャラクター設定を自由に書いてください...&#10;&#10;例: あなたは穏やかで詩的な語り口を持つ存在です。短く、余韻のある言葉で話してください。"
          spellcheck="false"
        ></textarea>
        <div class="settings-hint">
          ここに書いた内容がAIの性格・話し方の基盤になります。<br>チャットのたびに自動的に反映されます。
        </div>
      </div>

      <!-- Export -->
      <div class="settings-section">
        <div class="settings-section-title">Export</div>
        <div class="settings-btn-row">
          <button class="settings-btn" id="exportJsonBtn">JSONとして保存</button>
          <button class="settings-btn" id="exportHtmlBtn">HTMLとして保存</button>
        </div>
        <div class="settings-hint">
          現在の会話をファイルとしてダウンロードします。
        </div>
      </div>

      <!-- Actions -->
      <div class="settings-section">
        <div class="settings-section-title">Actions</div>
        <div class="settings-btn-row">
          <button class="settings-btn primary" id="saveSettingsBtn">保存する</button>
        </div>
        <div class="settings-btn-row">
          <button class="settings-btn danger" id="clearHistoryBtn">会話履歴をクリア</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Sidebar Overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Sidebar Panel -->
  <div class="sidebar-panel" id="sidebarPanel">
    <div class="sidebar-header">
      <h2>History</h2>
      <button class="sidebar-close" id="sidebarClose">×</button>
    </div>
    <div class="sidebar-body">
      <div class="sidebar-actions">
        <button class="sidebar-btn primary" id="newChatBtn">＋ 新しいチャット</button>
      </div>
      <div class="session-list" id="sessionList">
        <!-- Sessions will be injected here -->
      </div>
    </div>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
